<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel - Dashboard Secretario | Escuela Philips</title>
    <link rel="icon" href="https://www.philips.edu.ar/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body data-theme="secretario"
    class="text-slate-600 dark:text-slate-300 flex h-screen overflow-hidden bg-[#ECFEFF] dark:bg-slate-900">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#ECFEFF] dark:bg-slate-900">
        <header
            class="h-20 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-cyan-50 dark:border-slate-700 flex items-center justify-between px-8 z-10 sticky top-0">
            <h2 id="page-title" class="text-2xl font-extrabold text-slate-800 dark:text-slate-100">Panel Secretario</h2>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 bg-cyan-50 dark:bg-slate-700 rounded-xl flex items-center justify-center hover:scale-110 transition-all">
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 dark:hidden"></i>
                    <i data-lucide="moon" class="w-5 h-5 text-slate-300 hidden dark:block"></i>
                </button>
                <div class="text-right leading-tight">
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-200">Martínez, Ana</p>
                    <p class="text-[11px] text-cyan-500 dark:text-cyan-400 font-bold">Secretaria</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <section class="max-w-6xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-3 mb-3">
                            <div
                                class="w-10 h-10 bg-cyan-100 dark:bg-cyan-900/30 rounded-xl flex items-center justify-center">
                                <i data-lucide="users" class="w-5 h-5 text-cyan-600"></i>
                            </div>
                            <span class="text-xs font-bold text-slate-400 uppercase">Alumnos</span>
                        </div>
                        <p class="text-3xl font-black text-slate-800 dark:text-slate-100">352</p>
                        <p class="text-xs text-slate-400 mt-1">Matriculados</p>
                    </div>
                    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-3 mb-3">
                            <div
                                class="w-10 h-10 bg-blue-100 dark:bg-blue-900/30 rounded-xl flex items-center justify-center">
                                <i data-lucide="file-text" class="w-5 h-5 text-blue-600"></i>
                            </div>
                            <span class="text-xs font-bold text-slate-400 uppercase">Legajos</span>
                        </div>
                        <p class="text-3xl font-black text-slate-800 dark:text-slate-100">15</p>
                        <p class="text-xs text-orange-500 font-bold mt-1">Pendientes</p>
                    </div>
                    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-3 mb-3">
                            <div
                                class="w-10 h-10 bg-green-100 dark:bg-green-900/30 rounded-xl flex items-center justify-center">
                                <i data-lucide="clipboard-check" class="w-5 h-5 text-green-600"></i>
                            </div>
                            <span class="text-xs font-bold text-slate-400 uppercase">Certificados</span>
                        </div>
                        <p class="text-3xl font-black text-slate-800 dark:text-slate-100">8</p>
                        <p class="text-xs text-green-500 font-bold mt-1">Por emitir</p>
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-8 shadow-sm">
                    <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-6">Accesos Rápidos</h3>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <a href="legajos.html"
                            class="p-6 bg-cyan-50 dark:bg-cyan-900/20 rounded-2xl hover:shadow-md transition text-center">
                            <i data-lucide="folder-open" class="w-8 h-8 mx-auto mb-2 text-cyan-600"></i>
                            <p class="font-bold text-slate-700 dark:text-slate-200">Gestionar Legajos</p>
                        </a>
                        <a href="inscripciones.html"
                            class="p-6 bg-blue-50 dark:bg-blue-900/20 rounded-2xl hover:shadow-md transition text-center">
                            <i data-lucide="user-plus" class="w-8 h-8 mx-auto mb-2 text-blue-600"></i>
                            <p class="font-bold text-slate-700 dark:text-slate-200">Inscripciones</p>
                        </a>
                        <a href="reportes.html"
                            class="p-6 bg-purple-50 dark:bg-purple-900/20 rounded-2xl hover:shadow-md transition text-center">
                            <i data-lucide="bar-chart-3" class="w-8 h-8 mx-auto mb-2 text-purple-600"></i>
                            <p class="font-bold text-slate-700 dark:text-slate-200">Reportes</p>
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
    <script>
        initSidebar('secretario', 'panel');
        updatePageTitle('Panel Secretario');
    </script>
</body>

</html>
