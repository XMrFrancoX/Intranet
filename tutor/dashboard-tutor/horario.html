<body data-theme="tutor"

            class="h-20 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-indigo-50 dark:border-slate-700 flex items-center justify-between px-8 z-10 sticky top-0">

                    Semanal</h2>

                    class="text-xs font-bold px-3 py-1 bg-indigo-100 dark:bg-blue-900/30 text-indigo-600 dark:text-indigo-400 rounded-full">6to
                    Año "A"</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 bg-indigo-50 dark:bg-slate-700 rounded-xl flex items-center justify-center hover:scale-110 transition-all">
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 dark:hidden"></i>
                    <i data-lucide="moon" class="w-5 h-5 text-slate-300 hidden dark:block"></i>
                </button>
                <div class="text-right leading-tight">
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-200">Ortiz Ruiz Franco Valentin</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <section class="max-w-full mx-auto">
                <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-5">
                        <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                            <i data-lucide="calendar-clock" class="w-5 h-5 text-indigo-500"></i>
                            Horario Semanal — Ciclo 2026
                        </h3>
                        <div class="flex items-center gap-2 text-xs text-slate-400 font-bold">
                            <i data-lucide="clock" class="w-4 h-4"></i> Hora local Argentina (UTC-3)
                        </div>
                    </div>

                    <div class="schedule-wrapper">
                        <div id="schedule-grid" class="schedule-grid">
                            <!-- Generated by JS -->
                        </div>
                    </div>

                    <!-- Legend -->
                    <div class="schedule-legend mt-5">
                        <div class="legend-item">
                            <div class="legend-dot bg-blue-300"></div> Materias generales
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot bg-green-300"></div> Taller / Práctica
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot bg-purple-300"></div> Inglés técnico
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot bg-amber-300"></div> Laboratorio
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot bg-cyan-300"></div> Ed. Física
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot bg-rose-300"></div> Talleres esp.
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background:#d1d5db"></div> Recreo
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
    <script>
        initSidebar('tutor', 'horario');
        updatePageTitle('Cronograma Semanal');

        // ---- SCHEDULE DATA ----
        // Each entry: { day, start, end, name, room, teacher, color }
        // day: 0=Lunes, 1=Martes, 2=Miércoles, 3=Jueves, 4=Viernes
        const SCHEDULE = [
            // LUNES
            { day: 0, start: '07:45', end: '09:05', name: 'G.P.P.', teacher: 'Acuña, J.', room: 'Aula 0-7', color: 'sb-blue' },
            { day: 0, start: '09:05', end: '09:55', name: 'Recreo Extendido', teacher: '', room: 'Aula 0-7', color: 'sb-break' },
            { day: 0, start: '09:55', end: '10:20', name: 'MICRO', teacher: '', room: '', color: 'sb-green' },
            { day: 0, start: '10:20', end: '12:25', name: 'Ed. Física 8', teacher: 'Cristi, M.', room: 'Campo Deportes III', color: 'sb-cyan' },
            { day: 0, start: '12:25', end: '12:55', name: 'MICRO', teacher: '', room: '', color: 'sb-green' },
            { day: 0, start: '12:55', end: '13:30', name: 'Almuerzo', teacher: '', room: 'Comedor S4', color: 'sb-break' },
            { day: 0, start: '13:30', end: '14:30', name: 'Proy. Inst. Eléctrica 8', teacher: 'Roche, L.', room: 'Aula 0-7', color: 'sb-indigo' },
            { day: 0, start: '14:40', end: '15:25', name: 'Proy. Inst. Eléctrica 8', teacher: 'Roche, L.', room: 'Aula 0-7', color: 'sb-indigo' },
            { day: 0, start: '15:45', end: '17:00', name: 'Mag. Eq. y Acc.', teacher: 'Roche, L.', room: 'Aula 0-7', color: 'sb-rose' },

            // MARTES
            { day: 1, start: '07:45', end: '12:05', name: 'Prac. Prof.', teacher: 'Fabbiani, S.', room: 'Aula 0-7', color: 'sb-green' },
            { day: 1, start: '12:05', end: '12:55', name: 'Prac. Prof.', teacher: 'Fabbiani, S.', room: 'Aula 0-7', color: 'sb-green' },
            { day: 1, start: '12:55', end: '13:30', name: 'Almuerzo', teacher: '', room: 'Comedor S1', color: 'sb-break' },
            { day: 1, start: '14:15', end: '14:10', name: 'Mag. Eq. y Acc.', teacher: 'Roche, L.', room: 'Aula 0-7', color: 'sb-rose' },
            { day: 1, start: '14:15', end: '15:35', name: 'Proy. Inst. Industriales 8', teacher: 'Rovira, G.', room: 'Aula 0-7', color: 'sb-indigo' },
            { day: 1, start: '15:45', end: '17:00', name: 'Proy. Inst. Eléctrica 8', teacher: 'Roche, L.', room: 'Aula 0-7', color: 'sb-indigo' },

            // MIERCOLES
            { day: 2, start: '07:45', end: '12:55', name: 'Prac. Prof.', teacher: 'Fabbiani, S.', room: 'Aula 0-7', color: 'sb-green' },
            { day: 2, start: '12:55', end: '13:30', name: 'Almuerzo', teacher: '', room: 'Comedor S1', color: 'sb-break' },
            { day: 2, start: '13:30', end: '14:32', name: 'Environment', teacher: 'Solimano, F.', room: 'Aula 0-7', color: 'sb-teal' },
            { day: 2, start: '14:40', end: '15:35', name: 'Environment', teacher: 'Solimano, F.', room: 'Aula 0-7', color: 'sb-teal' },
            { day: 2, start: '15:45', end: '17:45', name: 'Lab. Ensayo Industriales 8', teacher: 'Faletti, M.', room: 'Aula 0-7', color: 'sb-amber' },

            // JUEVES
            { day: 3, start: '07:45', end: '09:05', name: 'G.P.P.', teacher: 'Acuña, J.', room: 'Aula 0-7', color: 'sb-blue' },
            { day: 3, start: '09:15', end: '10:35', name: 'Ciudadanía y Trabajo', teacher: 'Cortese, J.', room: 'Aula 0-7', color: 'sb-blue' },
            { day: 3, start: '10:45', end: '11:45', name: 'Technical English', teacher: 'Consard, L.', room: 'Aula 0-7', color: 'sb-purple' },
            { day: 3, start: '11:55', end: '12:55', name: 'Technical English', teacher: 'Consard, L.', room: 'Aula 0-7', color: 'sb-purple' },
            { day: 3, start: '12:55', end: '13:30', name: 'Almuerzo', teacher: '', room: 'Comedor S1', color: 'sb-break' },
            { day: 3, start: '13:30', end: '14:30', name: 'Proy. Inst. Industriales 8', teacher: 'Rovira, G.', room: 'Aula 0-7', color: 'sb-indigo' },
            { day: 3, start: '14:40', end: '15:35', name: 'Proy. Inst. Industriales 8', teacher: 'Rovira, G.', room: 'Aula 0-7', color: 'sb-indigo' },
            { day: 3, start: '15:45', end: '17:45', name: 'Thermodynamics 8', teacher: 'Logvinov, O.', room: 'Aula 0-7', color: 'sb-amber' },

            // VIERNES
            { day: 4, start: '07:45', end: '12:55', name: 'Prac. Prof.', teacher: 'Fabbiani, S.', room: 'Aula 0-7', color: 'sb-green' },
            { day: 4, start: '12:55', end: '13:30', name: 'Technical English', teacher: 'Consard, L.', room: 'Aula 0-7', color: 'sb-purple' },
            { day: 4, start: '13:30', end: '14:10', name: 'Almuerzo', teacher: '', room: 'Comedor S1', color: 'sb-break' },
            { day: 4, start: '14:15', end: '15:15', name: 'Science & Technology', teacher: 'Volpi, J.', room: 'Aula 0-7', color: 'sb-teal' },
            { day: 4, start: '15:25', end: '17:45', name: 'Thermodynamics 8', teacher: 'Logvinov, O.', room: 'Aula 0-7', color: 'sb-amber' },
        ];

        const DAYS = ['LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES'];

        function timeToMinutes(t) {
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }

        function minutesToTime(mins) {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function buildSchedule() {
            const grid = document.getElementById('schedule-grid');

            // Find min and max times across all entries
            let minTime = Infinity, maxTime = -Infinity;
            SCHEDULE.forEach(s => {
                const start = timeToMinutes(s.start);
                const end = timeToMinutes(s.end);
                if (start < minTime) minTime = start;
                if (end > maxTime) maxTime = end;
            });

            // Round to nearest 15 min
            minTime = Math.floor(minTime / 15) * 15;
            maxTime = Math.ceil(maxTime / 15) * 15;

            const SLOT = 15; // minutes per row
            const totalSlots = (maxTime - minTime) / SLOT;
            const PX_PER_SLOT = 14; // px per 15 minutes

            // Set grid rows
            const totalRows = totalSlots + 1; // +1 for header
            grid.style.gridTemplateRows = `40px repeat(${totalSlots}, ${PX_PER_SLOT}px)`;

            // Header row
            let html = `<div class="schedule-day-header time-header"></div>`;
            DAYS.forEach(d => {
                html += `<div class="schedule-day-header">${d}</div>`;
            });

            // Time slots
            for (let slot = 0; slot < totalSlots; slot++) {
                const mins = minTime + slot * SLOT;
                const isHour = mins % 60 === 0;
                const label = isHour ? minutesToTime(mins) : '';

                html += `<div class="time-cell">
                    <span class="time-label">${label}</span>
                </div>`;

                // 5 day columns
                for (let day = 0; day < 5; day++) {
                    html += `<div class="day-cell" data-slot="${slot}" data-day="${day}"></div>`;
                }
            }

            grid.innerHTML = html;

            // Place subject blocks
            SCHEDULE.forEach(s => {
                const startMins = timeToMinutes(s.start);
                const endMins = timeToMinutes(s.end);

                const startSlot = (startMins - minTime) / SLOT;
                const duration = (endMins - startMins) / SLOT;

                const heightPx = duration * PX_PER_SLOT - 4;
                const topOffset = 4;

                // The grid rows: row 1 = header, row (startSlot+2) = first body slot
                const gridRowStart = startSlot + 2;
                const gridRowEnd = gridRowStart + duration;

                // Find the right cell to append to (col = day + 2)
                const colIndex = s.day + 2; // 1-indexed in CSS grid
                const rowKey = startSlot;

                // Create a positioned block inside the grid area
                const block = document.createElement('div');
                block.className = `subject-block ${s.color}`;
                block.style.cssText = `
                    position: absolute;
                    top: ${topOffset}px;
                    left: 3px;
                    right: 3px;
                    height: ${heightPx}px;
                    border-radius: 8px;
                `;

                let detail = '';
                if (s.teacher) detail += s.teacher;
                if (s.room) detail += (detail ? ' · ' : '') + s.room;

                block.innerHTML = `
                    <div class="sb-time">${s.start} – ${s.end}</div>
                    <div class="sb-name">${s.name}</div>
                    ${detail ? `<div class="sb-detail">${detail}</div>` : ''}
                `;

                // Append to the right day column wrapper using CSS grid positioning
                block.style.gridColumn = `${colIndex}`;
                block.style.gridRow = `${gridRowStart} / ${gridRowEnd}`;
                block.style.position = 'absolute';
                block.style.top = `${topOffset}px`;
                block.style.left = '3px';
                block.style.right = '3px';
                block.style.height = `${heightPx}px`;

                // Create a wrapper positioned div
                const wrapper = document.createElement('div');
                wrapper.style.cssText = `
                    grid-column: ${colIndex};
                    grid-row: ${gridRowStart} / ${gridRowEnd};
                    position: relative;
                    pointer-events: none;
                    z-index: 2;
                `;
                block.style.position = 'absolute';
                block.style.top = `${topOffset}px`;
                block.style.left = '3px';
                block.style.right = '3px';
                block.style.height = `${heightPx}px`;
                block.style.pointerEvents = 'auto';
                wrapper.appendChild(block);
                grid.appendChild(wrapper);
            });
        }

        document.addEventListener('DOMContentLoaded', buildSchedule);
    </script>
</body>

</html>
