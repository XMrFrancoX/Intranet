<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificaciones - Dashboard Alumno | Escuela Philips</title>
    <link rel="icon" href="https://www.philips.edu.ar/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body data-theme="alumno"
    class="text-slate-600 dark:text-slate-300 flex h-screen overflow-hidden bg-[#F8FAFC] dark:bg-slate-900">

    <!-- SIDEBAR (same as other pages) -->
    <aside id="sidebar"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#F8FAFC] dark:bg-slate-900">
        <header
            class="h-20 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-blue-50 dark:border-slate-700 flex items-center justify-between px-8 z-10 sticky top-0">
            <h2 id="page-title" class="text-2xl font-extrabold text-slate-800 dark:text-slate-100">Boletín de
                Calificaciones</h2>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 bg-blue-50 dark:bg-slate-700 rounded-xl flex items-center justify-center hover:scale-110 transition-all">
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 dark:hidden"></i>
                    <i data-lucide="moon" class="w-5 h-5 text-slate-300 hidden dark:block"></i>
                </button>
                <div class="text-right leading-tight">
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-200">Ortiz Ruiz Franco Valentin</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <section class="max-w-6xl mx-auto">
                <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-8 shadow-sm">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h3 class="text-2xl font-bold text-slate-800 dark:text-slate-100">Calificaciones 2026</h3>
                            <p class="text-slate-500 dark:text-slate-400">6to Año - Especialidad Electrónica</p>
                        </div>
                        <div class="flex gap-2">
                            <button
                                class="px-4 py-2 bg-blue-500 text-white rounded-xl font-bold hover:bg-blue-600 transition flex items-center gap-2">
                                <i data-lucide="download" class="w-4 h-4"></i> Descargar PDF
                            </button>
                        </div>
                    </div>

                    <div
                        class="bg-gradient-to-r from-blue-500 to-indigo-500 rounded-2xl p-8 text-white text-center mb-8">
                        <i data-lucide="file-bar-chart-2" class="w-16 h-16 mx-auto mb-4 opacity-80"></i>
                        <h4 class="text-2xl font-bold mb-2">Boletín Próximamente</h4>
                        <p class="text-blue-100">Las calificaciones estarán disponibles al finalizar el primer trimestre
                        </p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
    <script>
        initSidebar('alumno', 'calificaciones');
        updatePageTitle('Boletín de Calificaciones');
    </script>
</body>

</html>
