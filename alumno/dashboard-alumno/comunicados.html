<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicados - Dashboard Alumno | Escuela Philips</title>
    <link rel="icon" href="https://www.philips.edu.ar/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body data-theme="alumno"
    class="text-slate-600 dark:text-slate-300 flex h-screen overflow-hidden bg-[#F8FAFC] dark:bg-slate-900">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>
    <div id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#F8FAFC] dark:bg-slate-900">
        <header
            class="h-20 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-blue-50 dark:border-slate-700 flex items-center justify-between px-8 z-10 sticky top-0">
            <button onclick="toggleMobileSidebar()" class="mobile-menu-btn md:hidden mr-3 w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-700 hover:scale-110 transition-all flex-shrink-0" aria-label="Abrir menú">
                    <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-300"></i>
                </button>
            <h2 id="page-title" class="text-2xl font-extrabold text-slate-800 dark:text-slate-100">Comunicados
                Institucionales</h2>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 bg-blue-50 dark:bg-slate-700 rounded-xl flex items-center justify-center hover:scale-110 transition-all">
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 dark:hidden"></i>
                    <i data-lucide="moon" class="w-5 h-5 text-slate-300 hidden dark:block"></i>
                </button>
                <div class="text-right leading-tight">
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-200">Ortiz Ruiz Franco Valentin</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <section class="max-w-5xl mx-auto">
                <div class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-50 dark:border-slate-700 flex justify-between items-center">
                        <h3 class="font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2">
                            <i data-lucide="inbox" class="w-5 h-5"></i> Bandeja de Entrada
                        </h3>
                        <div
                            class="bg-slate-50 dark:bg-slate-700/50 px-4 py-2 rounded-xl flex items-center gap-2 focus-within:ring-2 focus-within:ring-blue-100 dark:focus-within:ring-blue-900">
                            <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                            <input type="text" placeholder="Buscar..."
                                class="bg-transparent text-sm outline-none w-32 md:w-48 dark:text-slate-200 dark:placeholder-slate-500">
                        </div>
                    </div>
                    <div>
                        <div
                            class="p-6 border-b border-slate-50 dark:border-slate-700 hover:bg-blue-50/30 dark:hover:bg-slate-700/30 transition cursor-pointer group">
                            <div class="flex justify-between mb-2">
                                <span
                                    class="bg-blue-100 text-blue-600 dark:bg-blue-900/40 dark:text-blue-300 px-3 py-1 rounded-full text-[10px] font-bold uppercase">Institucional</span>
                                <span class="text-xs text-slate-400 font-bold flex items-center gap-1"><i
                                        data-lucide="clock" class="w-3 h-3"></i> 2d</span>
                            </div>
                            <h4
                                class="text-lg font-bold text-slate-800 dark:text-slate-100 group-hover:text-blue-600 dark:group-hover:text-blue-400 mb-1 transition">
                                Inicio de clases y actos protocolares</h4>
                            <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-2">Estimadas familias, les
                                informamos el cronograma para el primer día de clases...</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
    <script>
        initSidebar('alumno', 'comunicados');
        updatePageTitle('Comunicados Institucionales');
    </script>
</body>

</html>
