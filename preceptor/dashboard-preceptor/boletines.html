<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletines - Dashboard Preceptor | Escuela Philips</title>
    <link rel="icon" href="https://www.philips.edu.ar/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .alumno-card {
            transition: all 0.2s;
        }

        .alumno-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.12);
        }

        .promedio-badge {
            min-width: 44px;
            text-align: center;
        }

        .boletin-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
            animation: fadeInModal 0.25s ease;
        }

        .boletin-modal.active {
            display: flex;
        }

        @keyframes fadeInModal {
            from {
                opacity: 0;
                transform: scale(0.96);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOutModal {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.96);
            }
        }

        .boletin-modal.closing {
            animation: fadeOutModal 0.22s ease forwards;
        }

        .nota-cell {
            min-width: 40px;
            text-align: center;
            font-weight: 800;
        }

        .nota-alta {
            color: #10b981;
        }

        .nota-media {
            color: #f59e0b;
        }

        .nota-baja {
            color: #ef4444;
        }
    </style>
</head>

<body data-theme="preceptor"
    class="text-slate-600 dark:text-slate-300 flex h-screen overflow-hidden bg-[#F0FDF4] dark:bg-slate-900">

    <aside id="sidebar"></aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#F0FDF4] dark:bg-slate-900">
        <header
            class="h-20 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-emerald-50 dark:border-slate-700 flex items-center justify-between px-8 z-10 sticky top-0">
            <h2 id="page-title" class="text-2xl font-extrabold text-slate-800 dark:text-slate-100">Boletines por Curso
            </h2>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 bg-emerald-50 dark:bg-slate-700 rounded-xl flex items-center justify-center hover:scale-110 transition-all">
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 dark:hidden"></i>
                    <i data-lucide="moon" class="w-5 h-5 text-slate-300 hidden dark:block"></i>
                </button>
                <div class="text-right leading-tight">
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-200">Fernández, Claudia</p>
                    <p class="text-[11px] text-emerald-500 font-bold">Preceptora</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <section class="max-w-6xl mx-auto space-y-6">

                <!-- Selector de curso -->
                <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-6 shadow-sm">
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="flex items-center gap-2">
                            <i data-lucide="graduation-cap" class="w-5 h-5 text-emerald-500"></i>
                            <span class="font-bold text-slate-700 dark:text-slate-200">Seleccionar Curso:</span>
                        </div>
                        <div class="flex flex-wrap gap-2" id="curso-tabs">
                            <!-- Generated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Alumnos del curso -->
                <div class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-sm overflow-hidden">
                    <div class="p-5 border-b border-slate-50 dark:border-slate-700 flex items-center justify-between">
                        <h3 class="font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2 text-lg">
                            <i data-lucide="users" class="w-5 h-5 text-emerald-500"></i>
                            Alumnos — <span id="curso-label" class="text-emerald-500"></span>
                        </h3>
                        <div class="relative">
                            <i data-lucide="search"
                                class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                            <input type="text" id="search-alumno" placeholder="Buscar alumno..."
                                oninput="filterAlumnos()"
                                class="pl-9 pr-4 py-2 text-sm border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-medium focus:outline-none focus:ring-2 focus:ring-emerald-300">
                        </div>
                    </div>
                    <div id="alumnos-list" class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- MODAL: Boletín Individual -->
    <div id="boletin-modal" class="boletin-modal" onclick="if(event.target===this)closeBoletin()">
        <div
            class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl w-full max-w-3xl mx-4 max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-slate-50 dark:border-slate-700 flex items-start justify-between">
                <div>
                    <p id="modal-curso-label" class="text-xs font-bold text-emerald-500 uppercase mb-1"></p>
                    <h3 id="modal-alumno-name" class="text-xl font-extrabold text-slate-800 dark:text-slate-100"></h3>
                    <p class="text-sm text-slate-400 font-bold mt-0.5">Ciclo Lectivo 2026</p>
                </div>
                <button onclick="closeBoletin()"
                    class="w-9 h-9 rounded-xl bg-slate-100 dark:bg-slate-700 flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <div id="modal-boletin-content"></div>
            </div>
            <div class="p-5 border-t border-slate-50 dark:border-slate-700 flex justify-between items-center">
                <div id="modal-promedio-total" class="font-bold text-slate-600 dark:text-slate-300 text-sm"></div>
                <button onclick="closeBoletin()"
                    class="px-5 py-2 bg-emerald-500 text-white rounded-xl font-bold hover:bg-emerald-600 transition flex items-center gap-2">
                    <i data-lucide="x" class="w-4 h-4"></i> Cerrar
                </button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
    <script>
        initSidebar('preceptor', 'boletines');
        updatePageTitle('Boletines por Curso');

        const CURSOS = ['1° A', '1° B', '2° A', '2° B', '3° A', '3° B', '4° A', '4° B', '5° A', '5° B', '6° A', '6° B'];

        const MATERIAS = [
            'Matemática', 'Lengua y Literatura', 'Historia', 'Geografía', 'Biología',
            'Ed. Física', 'Inglés Técnico', 'Ciudadanía y Trabajo', 'Química',
            'Environment', 'Thermodynamics', 'Prac. Profesionalizante'
        ];

        // Generate demo students and grades
        const ALUMNOS_DATA = {};
        CURSOS.forEach(curso => {
            const count = Math.floor(Math.random() * 6) + 8;
            const alumnos = [];
            const names = ['García, Lucas', 'López, Valentina', 'Martínez, Tomás', 'Rodríguez, Camila',
                'Pérez, Mateo', 'Fernández, Sofía', 'González, Benjamín', 'Díaz, Mía', 'Ruiz, Thiago',
                'Sánchez, Emma', 'Torres, Lautaro', 'Ramírez, Isabella', 'Flores, Juan', 'Acosta, Alma',
                'Herrera, Felipe', 'Medina, Catalina', 'Castro, Joaquín', 'Vargas, Delfina'];
            for (let i = 0; i < count; i++) {
                const materias = MATERIAS.map(m => ({
                    nombre: m,
                    t1: Math.floor(Math.random() * 5) + 5,
                    t2: Math.floor(Math.random() * 5) + 5,
                    t3: null
                }));
                const promedio = (materias.reduce((a, m) => a + (m.t1 + m.t2) / 2, 0) / materias.length).toFixed(1);
                alumnos.push({
                    nombre: names[i % names.length] + (i > names.length ? ' ' + i : ''),
                    promedio: parseFloat(promedio),
                    materias
                });
            }
            alumnos.sort((a, b) => a.nombre.localeCompare(b.nombre));
            ALUMNOS_DATA[curso] = alumnos;
        });

        let currentCurso = '6° A';
        let searchVal = '';

        function renderCursoTabs() {
            const container = document.getElementById('curso-tabs');
            container.innerHTML = CURSOS.map(c => `
                <button onclick="selectCurso('${c}')"
                    class="curso-tab px-3 py-1.5 rounded-xl text-sm font-bold transition-all ${c === currentCurso
                    ? 'bg-emerald-500 text-white shadow-sm'
                    : 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-100'}"
                    data-curso="${c}">
                    ${c}
                </button>
            `).join('');
        }

        function selectCurso(curso) {
            currentCurso = curso;
            searchVal = '';
            document.getElementById('search-alumno').value = '';
            renderCursoTabs();
            renderAlumnos();
        }

        function filterAlumnos() {
            searchVal = document.getElementById('search-alumno').value.toLowerCase();
            renderAlumnos();
        }

        function renderAlumnos() {
            document.getElementById('curso-label').textContent = currentCurso;
            const alumnos = (ALUMNOS_DATA[currentCurso] || []).filter(a =>
                !searchVal || a.nombre.toLowerCase().includes(searchVal)
            );
            const list = document.getElementById('alumnos-list');

            if (alumnos.length === 0) {
                list.innerHTML = '<div class="col-span-3 text-center py-12 text-slate-400">No se encontraron alumnos</div>';
                return;
            }

            list.innerHTML = alumnos.map((a, i) => {
                const p = a.promedio;
                const pColor = p >= 7 ? 'text-emerald-500' : p >= 5 ? 'text-amber-500' : 'text-red-500';
                const pBg = p >= 7 ? 'bg-emerald-50 dark:bg-emerald-900/20' : p >= 5 ? 'bg-amber-50 dark:bg-amber-900/20' : 'bg-red-50 dark:bg-red-900/20';
                return `
                <div class="alumno-card bg-slate-50 dark:bg-slate-700/50 rounded-2xl p-4 flex items-center gap-4 cursor-pointer border border-transparent hover:border-emerald-200 dark:hover:border-emerald-800"
                    onclick="openBoletin(${i})">
                    <div class="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600 font-extrabold text-sm flex-shrink-0">
                        ${a.nombre.charAt(0)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-slate-700 dark:text-slate-200 text-sm truncate">${a.nombre}</p>
                        <p class="text-xs text-slate-400 font-bold">${currentCurso}</p>
                    </div>
                    <div class="promedio-badge ${pBg} ${pColor} px-3 py-1 rounded-xl font-extrabold text-sm">
                        ${p}
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                </div>`;
            }).join('');

            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function openBoletin(index) {
            const filtered = (ALUMNOS_DATA[currentCurso] || []).filter(a =>
                !searchVal || a.nombre.toLowerCase().includes(searchVal)
            );
            const alumno = filtered[index];
            if (!alumno) return;

            document.getElementById('modal-alumno-name').textContent = alumno.nombre;
            document.getElementById('modal-curso-label').textContent = `Boletín — ${currentCurso}`;

            const totalProm = (alumno.materias.reduce((a, m) => a + (m.t1 + m.t2) / 2, 0) / alumno.materias.length).toFixed(2);
            document.getElementById('modal-promedio-total').textContent = `Promedio general: ${totalProm}`;

            const rows = alumno.materias.map(m => {
                const prom = ((m.t1 + m.t2) / 2).toFixed(1);
                const nc = (n) => n >= 7 ? 'nota-alta' : n >= 5 ? 'nota-media' : 'nota-baja';
                return `<tr class="border-b border-slate-50 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition">
                    <td class="py-3 px-4 font-bold text-slate-700 dark:text-slate-200 text-sm">${m.nombre}</td>
                    <td class="py-3 px-4 nota-cell ${nc(m.t1)}">${m.t1}</td>
                    <td class="py-3 px-4 nota-cell ${nc(m.t2)}">${m.t2}</td>
                    <td class="py-3 px-4 nota-cell text-slate-400">—</td>
                    <td class="py-3 px-4 nota-cell ${nc(parseFloat(prom))}">${prom}</td>
                </tr>`;
            }).join('');

            document.getElementById('modal-boletin-content').innerHTML = `
                <table class="w-full">
                    <thead>
                        <tr class="text-xs font-extrabold text-slate-400 uppercase border-b border-slate-100 dark:border-slate-700">
                            <th class="py-2 px-4 text-left">Materia</th>
                            <th class="py-2 px-4">1° Trim.</th>
                            <th class="py-2 px-4">2° Trim.</th>
                            <th class="py-2 px-4">3° Trim.</th>
                            <th class="py-2 px-4">Prom.</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;

            const modal = document.getElementById('boletin-modal');
            modal.classList.remove('closing');
            modal.classList.add('active');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function closeBoletin() {
            const modal = document.getElementById('boletin-modal');
            modal.classList.add('closing');
            setTimeout(() => {
                modal.classList.remove('active');
                modal.classList.remove('closing');
            }, 220);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCursoTabs();
            renderAlumnos();
        });
    </script>
</body>

</html>
